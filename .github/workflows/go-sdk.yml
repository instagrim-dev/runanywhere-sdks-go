# =============================================================================
# Go SDK (runanywhere-go) CI
#
# - build-and-test: Ubuntu, pure Go build/test (no CGO; device package uses stubs).
# - device-tests: macOS only; builds runanywhere-commons shared libs and runs
#   Go SDK tests with CGO (device package). Ensures on-device bindings and
#   lifecycle work.
# =============================================================================

name: Go SDK

on:
  push:
    branches: [main]
    paths:
      - 'sdk/runanywhere-go/**'
      - 'sdk/runanywhere-commons/**'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/runanywhere-go/**'
      - 'sdk/runanywhere-commons/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Disable CGO so device package uses stubs; native libs (rac_commons, etc.) are not built on this runner.
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Build SDK
        working-directory: sdk/runanywhere-go
        run: go build ./...

      - name: Vet SDK
        working-directory: sdk/runanywhere-go
        run: go vet ./...

      - name: Test SDK
        working-directory: sdk/runanywhere-go
        run: go test -v ./...

      - name: Build examples
        run: |
          cd sdk/runanywhere-go/examples/basic-chat && go build -o basic-chat . && cd "$GITHUB_WORKSPACE"
          cd sdk/runanywhere-go/examples/transcribe && go build -o transcribe . && cd "$GITHUB_WORKSPACE"
          cd sdk/runanywhere-go/examples/embeddings && go build -o embeddings .

  device-tests:
    name: Device tests (CGO + commons)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build commons and run Go device tests
        run: task device:test-go

  wasm-builds:
    name: WASM builds (browser + WASI)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Build WASM (browser)
        working-directory: sdk/runanywhere-go
        run: GOOS=js GOARCH=wasm go build -o dist/runanywhere.wasm ./cmd/runanywhere-wasm

      - name: Build WASM device (browser)
        working-directory: sdk/runanywhere-go
        run: GOOS=js GOARCH=wasm go build ./device/...

      - name: Vet WASM (browser)
        working-directory: sdk/runanywhere-go
        run: GOOS=js GOARCH=wasm go vet ./device/...

      - name: Build WASM (WASI)
        working-directory: sdk/runanywhere-go
        run: GOOS=wasip1 GOARCH=wasm go build ./device/...

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: runanywhere-wasm-browser
          path: sdk/runanywhere-go/dist/runanywhere.wasm

      - name: Test WASI host handler
        working-directory: sdk/runanywhere-go
        run: go test -v ./cmd/runanywhere-wasi-host/

      - name: Benchmark WASI host handler
        working-directory: sdk/runanywhere-go
        run: go test -bench=. -benchmem -benchtime=3s -count=1 ./cmd/runanywhere-wasi-host/ | tee wasi-bench.txt

      - name: Benchmark StreamFrame
        working-directory: sdk/runanywhere-go
        run: CGO_ENABLED=0 go test -bench=. -benchmem -benchtime=3s -count=1 ./device/ | tee device-bench.txt

      - name: Run browser WASM benchmarks
        working-directory: sdk/runanywhere-go
        run: |
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" dist/
          node wasm/harness/bench.mjs --iterations 500 | tee browser-bench.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: wasm-bench-results
          path: |
            sdk/runanywhere-go/wasi-bench.txt
            sdk/runanywhere-go/device-bench.txt
            sdk/runanywhere-go/browser-bench.txt
